spring:
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/dte?currentSchema=hapi_fhir
    driver-class-name: org.postgresql.Driver
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    max-active: 15
    hikari:
      maximum-pool-size: 10
  jpa:
    properties:
      hibernate:
        dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      ddl-auto: update
service:
  dte-backend:
    endpoint: https://dte.ehealth.fgov.be/dte-backend
    username: ${service.dte-backend.username}
    password: ${service.dte-backend.password}
logging:
  file:
    service-name: dte-hapi-prod